name: Team CI - Parallel Development

on:
  push:
    branches:
      - team-dev
      - feature/*
  pull_request:
    branches:
      - team-dev
      - main

jobs:
  # Go Backend Tests
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Download dependencies
        run: go mod download
      
      - name: Run tests
        run: go test ./... -v -race -coverprofile=coverage.out
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage.out
          flags: backend
          name: backend-coverage

  # Frontend Tests
  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/web
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/web/package.json
      
      - name: Install dependencies
        run: npm install
      
      - name: Type check
        run: npm run type-check
      
      - name: Lint
        run: npm run lint
      
      - name: Build
        run: npm run build

  # Integration Tests
  integration-test:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Start backend
        run: |
          cd backend
          go mod download
          go build -o server cmd/server/main.go
          ./server &
          sleep 5
      
      - name: Test API
        run: |
          curl -f http://localhost:8080/health || exit 1

  # Build Desktop App
  build-desktop:
    runs-on: ${{ matrix.os }}
    needs: [frontend-test]
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Build Web
        run: |
          cd frontend/web
          npm install
          npm run build
      
      - name: Copy to Electron
        run: |
          mkdir -p frontend/electron/renderer
          cp -r frontend/web/dist/* frontend/electron/renderer/
      
      - name: Build Electron (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd frontend/electron
          npm install
          npx electron-builder --linux AppImage
      
      - name: Build Electron (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd frontend/electron
          npm install
          npx electron-builder --win
      
      - name: Build Electron (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cd frontend/electron
          npm install
          npx electron-builder --mac
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: frontend/electron/dist/

  # Code Quality
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Go Lint
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest
          working-directory: backend
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Frontend Lint
        run: |
          cd frontend/web
          npm install
          npm run lint
