name: Desktop App Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install dependencies
      run: cd electron && npm install
      
    - name: Build Electron app
      run: cd electron && npm run build:win
      
    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: openclaw-music-windows
        path: electron/dist/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install dependencies
      run: cd electron && npm install
      
    - name: Build Electron app
      run: cd electron && npm run build:mac
      
    - name: Upload macOS artifact
      uses: actions/upload-artifact@v4
      with:
        name: openclaw-music-macos
        path: electron/dist/*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install dependencies
      run: cd electron && npm install
      
    - name: Build Electron app
      run: cd electron && npm run build:linux
      
    - name: Upload Linux artifact
      uses: actions/upload-artifact@v4
      with:
        name: openclaw-music-linux
        path: electron/dist/*.AppImage

  release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos, build-linux]
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: true
        
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: artifacts/**/*
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
