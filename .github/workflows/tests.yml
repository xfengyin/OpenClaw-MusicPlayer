name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.19'
        
    - name: Install dependencies
      run: go mod download
      
    - name: Run tests
      run: go test -v ./server/... -coverprofile=coverage.out
      
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        file: coverage.out
        flags: go
        name: codecov-go

  frontend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install dependencies
      run: cd web && npm install
      
    - name: Run unit tests
      run: cd web && npm run test:unit || true
      
    - name: Run e2e tests
      run: cd web && npm run test:e2e || true
