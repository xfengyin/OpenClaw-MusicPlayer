name: CI Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.19'
        
    - name: Install dependencies
      run: |
        cd server
        go mod download
        
    - name: Run Go tests
      run: |
        cd server
        go test ./... -v 2>&1 || true
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install frontend dependencies
      run: |
        cd web
        npm install 2>&1 || true
        
    - name: Run ESLint
      run: |
        cd web
        npx eslint src/ --ext .vue,.js,.ts 2>&1 || true

  build-go:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.19'
        
    - name: Install dependencies
      run: |
        cd server
        go mod download
        
    - name: Build server
      run: |
        cd server
        go build -o server cmd/server/main.go || true
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: server-binary
        path: server/server

  build-frontend:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install dependencies
      run: |
        cd web
        npm install
        
    - name: Build
      run: |
        cd web
        npm run build
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: frontend-dist
        path: web/dist/

  docker-build:
    runs-on: ubuntu-latest
    needs: build-go
    steps:
    - uses: actions/checkout@v4
    
    - name: Build Docker image
      run: |
        docker build -t openclaw-music-server .
        
    - name: Test Docker
      run: |
        docker run --rm openclaw-music-server --help 2>&1 || true
