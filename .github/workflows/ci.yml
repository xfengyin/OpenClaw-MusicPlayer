name: CI Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint-go:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.19'
        
    - name: Install dependencies
      run: go mod download
      
    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v3
      with:
        version: latest
        args: --timeout=5m ./...
        
    - name: Run tests
      run: |
        go test -v ./... -coverprofile=coverage.out
        go tool cover -func=coverage.out
        
  build-go:
    runs-on: ubuntu-latest
    needs: lint-go
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.19'
        
    - name: Install dependencies
      run: go mod download
      
    - name: Build
      run: |
        go build -o server cmd/server/main.go
        ls -la server
        
  lint-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install dependencies
      run: cd web && npm install
      
    - name: Run ESLint
      run: cd web && npm run lint
      
    - name: Run type check
      run: cd web && npx vue-tsc --noEmit
      
  build-frontend:
    runs-on: ubuntu-latest
    needs: lint-frontend
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install dependencies
      run: cd web && npm install
      
    - name: Build
      run: cd web && npm run build
      
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: frontend-dist
        path: web/dist/

  security-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Run Trivy
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'table'
        exit-code: '1'
        severity: 'CRITICAL,HIGH'
