name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  # Windows EXE 构建
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Build Go Server (Windows)
        run: |
          cd server
          go build -ldflags="-s -w" -o ../dist/server.exe ./cmd/server
        
      - name: Build Frontend
        run: |
          cd web
          npm install
          npm run build
          
      - name: Setup Electron
        run: |
          cd electron
          npm install
          
      - name: Copy Frontend to Electron
        run: |
          if (!(Test-Path "electron/renderer")) { New-Item -ItemType Directory -Path "electron/renderer" -Force }
          Copy-Item -Path "web/dist/*" -Destination "electron/renderer/" -Recurse -Force
          # Also copy to dist for extraResources
          if (!(Test-Path "electron/dist")) { New-Item -ItemType Directory -Path "electron/dist" -Force }
          Copy-Item -Path "web/dist/*" -Destination "electron/dist/" -Recurse -Force
          
      - name: Copy Server to Electron
        run: |
          if (!(Test-Path "electron/dist")) { New-Item -ItemType Directory -Path "electron/dist" -Force }
          Copy-Item -Path "dist/server.exe" -Destination "electron/dist/server.exe" -Force
          
      - name: Build Windows Installer
        run: |
          cd electron
          npx electron-builder --win --x64
          
      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: OpenClaw-Music-Player-Windows
          path: electron/dist/*.exe

  # Android APK 构建
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          
      - name: Install Cordova
        run: npm install -g cordova
          
      - name: Build Frontend
        run: |
          cd web
          npm install
          npm run build
          
      - name: Create Cordova Project
        run: |
          mkdir -p mobile
          cd mobile
          cordova create openclaw-music com.openclaw.musicplayer "OpenClaw Music"
          cd openclaw-music
          cordova platform add android
          
      - name: Copy Frontend to Cordova
        run: |
          rm -rf mobile/openclaw-music/www/*
          cp -r web/dist/* mobile/openclaw-music/www/
          
      - name: Build Android APK
        run: |
          cd mobile/openclaw-music
          cordova build android --release
          
      - name: Find and Sign APK
        run: |
          # List all generated files
          echo "=== All files in mobile directory ==="
          find mobile -type f -name "*.apk" -o -name "*.aab" 2>/dev/null
          
          # Cordova builds APK to a different location
          APK_DIR="mobile/openclaw-music/platforms/android/app/build/outputs/apk/release"
          AAB_DIR="mobile/openclaw-music/platforms/android/app/build/outputs/bundle/release"
          
          # Check for APK or AAB
          if [ -f "$APK_DIR/app-release-unsigned.apk" ]; then
            echo "Found unsigned APK"
            cd "$APK_DIR"
            
            # Generate keystore
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US" || true
            
            # Sign APK
            jarsigner -verbose -sigalg SHA1withRSA -digestalg SHA1 -keystore debug.keystore -storepass android app-release-unsigned.apk androiddebugkey || true
            
            # Align APK
            BUILD_TOOLS=$(ls -d ${ANDROID_HOME}/build-tools/*/ | sort -V | tail -1)
            $BUILD_TOOLS/zipalign -v 4 app-release-unsigned.apk OpenClaw-Music-Player.apk || cp app-release-unsigned.apk OpenClaw-Music-Player.apk
            
          elif [ -f "$AAB_DIR/app-release.aab" ]; then
            echo "Found AAB bundle, converting to APK..."
            # For now, copy AAB as artifact (can be converted to APK using bundletool)
            mkdir -p "$APK_DIR"
            cp "$AAB_DIR/app-release.aab" "$APK_DIR/OpenClaw-Music-Player.aab"
            cd "$APK_DIR"
            
          else
            echo "No APK or AAB found, searching entire directory..."
            find mobile -type f \( -name "*.apk" -o -name "*.aab" \) -exec ls -la {} \;
            
            # Try to find any APK
            ANY_APK=$(find mobile -name "*.apk" | head -1)
            if [ -n "$ANY_APK" ]; then
              echo "Found APK at: $ANY_APK"
              cp "$ANY_APK" mobile/openclaw-music/platforms/android/app/build/outputs/apk/release/OpenClaw-Music-Player.apk
            fi
          fi
          
      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: OpenClaw-Music-Player-Android
          path: |
            mobile/openclaw-music/platforms/android/app/build/outputs/apk/release/OpenClaw-Music-Player.apk
            mobile/openclaw-music/platforms/android/app/build/outputs/apk/release/OpenClaw-Music-Player.aab
        continue-on-error: true

  # Linux AppImage 构建
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Build Go Server (Linux)
        run: |
          cd server
          go build -ldflags="-s -w" -o ../dist/server ./cmd/server
        
      - name: Build Frontend
        run: |
          cd web
          npm install
          npm run build
          
      - name: Setup Electron
        run: |
          cd electron
          npm install
          
      - name: Copy Frontend to Electron
        run: |
          mkdir -p electron/renderer
          cp -r web/dist/* electron/renderer/
          # Also copy to dist for extraResources
          mkdir -p electron/dist
          cp -r web/dist/* electron/dist/
          
      - name: Copy Server to Electron
        run: |
          mkdir -p electron/dist
          cp dist/server electron/dist/server
          
      - name: Build Linux AppImage
        run: |
          cd electron
          npx electron-builder --linux AppImage
          
      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: OpenClaw-Music-Player-Linux
          path: electron/dist/*.AppImage

  # 创建发布版本
  create-release:
    needs: [build-windows, build-android, build-linux]
    runs-on: ubuntu-latest
    if: always() && (needs.build-windows.result == 'success' || needs.build-android.result == 'success' || needs.build-linux.result == 'success')
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: OpenClaw-Music-Player-Windows
          path: artifacts/windows
        continue-on-error: true
          
      - name: Download Android Artifact
        uses: actions/download-artifact@v4
        with:
          name: OpenClaw-Music-Player-Android
          path: artifacts/android
        continue-on-error: true
          
      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: OpenClaw-Music-Player-Linux
          path: artifacts/linux
        continue-on-error: true
          
      - name: List Artifacts
        run: |
          ls -la artifacts/ || true
          find artifacts -type f -name "*" || true
          
      - name: Prepare Release Files
        run: |
          mkdir -p release
          # Find and copy files (handle spaces in filenames)
          find artifacts/windows -name "*.exe" -type f -exec cp {} release/ \; 2>/dev/null || true
          find artifacts/android -name "*.apk" -type f -exec cp {} release/ \; 2>/dev/null || true
          find artifacts/android -name "*.aab" -type f -exec cp {} release/ \; 2>/dev/null || true
          find artifacts/linux -name "*.AppImage" -type f -exec cp {} release/ \; 2>/dev/null || true
          echo "=== Files in release directory ==="
          ls -la release/
          
      - name: Rename Files with Version
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          cd release
          for file in *; do
            if [ -f "$file" ]; then
              # Extract extension
              if [[ "$file" == *.exe ]]; then
                mv "$file" "OpenClaw-Music-Player-${VERSION}-Windows.exe"
              elif [[ "$file" == *.apk ]]; then
                mv "$file" "OpenClaw-Music-Player-${VERSION}-Android.apk"
              elif [[ "$file" == *.AppImage ]]; then
                mv "$file" "OpenClaw-Music-Player-${VERSION}-Linux.AppImage"
              fi
            fi
          done
          ls -la
          
      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          name: Release ${{ github.event.inputs.version || github.ref_name }}
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
      - name: Upload Release Files as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-files-${{ github.event.inputs.version || github.ref_name }}
          path: release/*
